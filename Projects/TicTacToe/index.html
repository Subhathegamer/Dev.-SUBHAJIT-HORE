 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    /* Reset and Page Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    /* Game Status Bar for your JS to update */
    .status {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #555;
    }

    /* The 3x3 Grid Container */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      background-color: #333;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    /* Individual Grid Squares */
    .box {
      background-color: #fff;
      border-radius: 5px;
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      
      /* Perfect horizontal & vertical centering */
      display: flex;
      align-items: center;
      justify-content: center;
      
      /* Smooth color change on hover */
      transition: background-color 0.2s, transform 0.1s;
    }

    .box:hover {
      background-color: #e3f2fd;
    }

    .box:active {
      transform: scale(0.95);
    }

    /* Reset Button */
    .reset-btn {
      margin-top: 25px;
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: bold;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background-color 0.2s;
    }

    .reset-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  
  <!-- Use this to show "Player X's Turn" or "Player O Wins!" via JS -->
  <div class="status" id="status-text">Player X's Turn</div>

  <!-- Unified grid replaces row divs, making data-index mapping seamless -->
  <div class="board">
    <div class="box" data-index="0">1</div>
    <div class="box" data-index="1">2</div>
    <div class="box" data-index="2">3</div>
    <div class="box" data-index="3">4</div>
    <div class="box" data-index="4">5</div>
    <div class="box" data-index="5">6</div>
    <div class="box" data-index="6">7</div>
    <div class="box" data-index="7">8</div>
    <div class="box" data-index="8">9</div>
  </div>

  <button class="reset-btn" id="reset-button">Restart Game</button>

  <script src="script.js"></script>
</body>
</html>
